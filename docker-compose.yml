services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mgh_travel}
      POSTGRES_USER: ${POSTGRES_USER:-mgh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mgh_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mgh} -d ${POSTGRES_DB:-mgh_travel}"]
      interval: 3s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: ./backend/Api
    command: ["--migrate"]
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-mgh_travel};Username=${POSTGRES_USER:-mgh};Password=${POSTGRES_PASSWORD:-mgh_dev_password}"
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./backend/Api
    restart: unless-stopped
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-mgh_travel};Username=${POSTGRES_USER:-mgh};Password=${POSTGRES_PASSWORD:-mgh_dev_password}"
      Cors__AllowedOrigin: "http://localhost:3000"
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8080"
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
